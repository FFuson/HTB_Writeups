<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="10" ry="10" fill="#0A0E0A"/>
  
  <!-- Símbolo # con candado abierto, simplificado, sin glow ni matrix -->
  <g stroke="#00FF6A" 
     fill="none" 
     stroke-width="3.2" 
     stroke-linecap="round" 
     stroke-linejoin="round">
    
    <!-- # base, ligeramente inclinado -->
    <path d="M 25 14 L 22.5 50"/>
    <path d="M 44 14 L 41.5 50"/>
    <path d="M 17 26 L 49 26"/>
    <path d="M 15.5 39 L 47.5 39"/>
    
    <!-- Arco del candado abierto, emergiendo desde la horizontal superior -->
    <!-- Pata izquierda anclada, con curva -->
    <path d="M 28.5 26 L 28.5 19 Q 28.5 14 32 14 Q 35.5 14 36.5 17"/>
    <!-- Pata derecha desenganchada, flotando arriba -->
    <path d="M 36.5 11 L 36.5 17"/>
    
    <!-- Ojo de cerradura en el centro -->
    <circle cx="32" cy="31" r="1.3"/>
    <path d="M 32 32 L 32 35.5"/>
  </g>
</svg>
