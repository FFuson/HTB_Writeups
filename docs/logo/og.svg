<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111927"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2332" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#9FEF00"/>
    <text x="60" y="93" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-weight="800" font-size="84" text-anchor="middle" fill="#111927">$</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#FFFFFF">
    <text x="240" y="170" font-size="72" font-weight="800">HTB Writeups Hub</text>
    <text x="240" y="225" font-size="32" fill="#9FEF00" font-weight="600">rootea.es</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#a1a1aa">
    <text x="80" y="340" font-size="28">
      Directorio curado de writeups de máquinas retiradas
    </text>
    <text x="80" y="380" font-size="28">
      de Hack The Box. Más de 200 máquinas indexadas.
    </text>
  </g>

  <g transform="translate(80, 460)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="0" y="0" width="280" height="60" rx="12" fill="#1a2332" stroke="#9FEF00" stroke-width="2"/>
    <text x="20" y="40" font-size="22" fill="#9FEF00" font-weight="700">S4vitar</text>
    <text x="120" y="40" font-size="20" fill="#a1a1aa">· IppSec</text>
    <text x="220" y="40" font-size="20" fill="#a1a1aa">· 0xdf</text>

    <rect x="300" y="0" width="380" height="60" rx="12" fill="#1a2332" stroke="#9FEF00" stroke-width="2"/>
    <text x="320" y="40" font-size="22" fill="#9FEF00" font-weight="700">El Pingüino de Mario</text>
    <text x="540" y="40" font-size="20" fill="#a1a1aa">· Securízame</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#666">
    <text x="80" y="595" font-size="20">Enlaces validados · 5 autores · Bilingüe ES/EN · MIT</text>
  </g>
</svg>
