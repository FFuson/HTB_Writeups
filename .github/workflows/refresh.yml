name: Refresh writeups catalog

# Cron: lunes a las 06:00 UTC (≈ 08:00 Madrid en invierno, 07:00 en verano).
# El "workflow_dispatch" permite lanzarlo a mano desde la pestaña Actions.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Invalidar caché antes de regenerar"
        type: boolean
        default: false

permissions:
  contents: write  # necesario para que el bot commitee de vuelta

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore pipeline cache
        uses: actions/cache@v4
        with:
          path: data/_cache
          # Cache key cambia con la fecha — refresca semanalmente para
          # purgar entradas que ya hayan expirado por TTL.
          key: htb-pipeline-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            htb-pipeline-cache-${{ runner.os }}-

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Run pipeline
        env:
          # Si en algún momento conseguís el token, configurad el secret
          # HTB_API_TOKEN en Settings → Secrets and variables → Actions.
          HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
        run: |
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            python -m scripts.pipeline --no-cache
          else
            python -m scripts.pipeline
          fi

      - name: Compute changelog
        id: changelog
        run: |
          summary=$(python -m scripts.changelog)
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          echo "Cambios detectados: $summary"

      - name: Commit & push if there are changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/machines.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sin cambios: nada que commitear"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          # Tag de backup ANTES del commit, apuntando al estado anterior.
          # Si el refresh introduce un bug, `git checkout backup-prev-refresh-YYYY-MM-DD`
          # devuelve al último estado bueno conocido.
          git tag "backup-prev-refresh-${today}" HEAD
          git commit -m "Refresh ${today}: ${{ steps.changelog.outputs.summary }}"
          git push
          git push --tags
