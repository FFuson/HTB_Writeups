name: Lighthouse CI

# Performance budget contra rootea.es. Falla si:
#   - Performance < 90
#   - Accessibility < 95
#   - Best practices < 95
#   - SEO < 95
#
# Corre tras cada push a main (post-deploy de Mintlify) y semanalmente
# por cron, para detectar regresiones que vengan del propio Mintlify
# o del Cloudflare Worker.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 2"  # martes 05:00 UTC, día siguiente al refresh
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Esperar 2 min al deploy de Mintlify
        run: sleep 120

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://rootea.es/
            https://rootea.es/all
            https://rootea.es/machines/linux/facil/lame
            https://rootea.es/en
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ".github/workflows/lighthouse.config.json"
